<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4, #45B7D1, #FFA07A) 0% 0% / 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 52px;
            font-weight: 900;
            color: #FFFFFF;
            margin-bottom: 40px;
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .card {
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35),
                        0 0 40px rgba(255, 255, 255, 0.5) inset;
            border: 3px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
        }

        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 18px 25px;
            border: 3px solid #FF6B6B;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            color: #333;
            background: #F5F5F5;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #4ECDC4;
            background: #FFFFFF;
            box-shadow: 0 0 0 8px rgba(78, 205, 196, 0.2);
            transform: scale(1.02);
        }

        input::placeholder {
            color: #999;
            font-weight: 500;
        }

        button {
            padding: 18px 40px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #FF6B6B, #FF8787);
            color: white;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 150px;
        }

        button:hover {
            background: linear-gradient(135deg, #FF8787, #FF6B6B);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(-2px) scale(1.02);
        }

        .result {
            display: none;
            margin-top: 40px;
            background: linear-gradient(135deg, #FFFACD, #FFE4B5);
            border-radius: 20px;
            padding: 35px;
            border: 4px solid #FF6B6B;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.3);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.8) rotateY(100deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #FF6B6B;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .result p {
            margin: 18px 0;
            font-size: 20px;
            color: #333;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            border-left: 6px solid #4ECDC4;
        }

        .result strong {
            color: #FF6B6B;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result span {
            color: #4ECDC4;
            font-weight: 900;
            font-size: 22px;
            background: linear-gradient(135deg, #FF6B6B, #FF8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #FFE0E0;
            border: 3px solid #FF6B6B;
            border-radius: 15px;
            color: #C41E3A;
            font-size: 18px;
            font-weight: 900;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
                margin-bottom: 25px;
            }

            .card {
                padding: 30px;
            }

            .search-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            input {
                width: 100%;
            }

            .result p {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 STUDENT MANAGEMENT SYSTEM</h1>

    <div class="card">
        <div class="search-container">
            <input type="number" id="studentId" placeholder="Enter Student ID (1-5)" min="1" max="5">
            <button onclick="searchStudent()">🔍 SEARCH</button>
        </div>

        <div class="error" id="errorMsg">
            ❌ Student Not Found! Try IDs 1-5
        </div>

        <div class="result" id="result">
            <h2>✅ Student Details</h2>
            <p><strong>🆔 ID:</strong> <span id="id">-</span></p>
            <p><strong>👤 Name:</strong> <span id="name">-</span></p>
            <p><strong>🎂 Age:</strong> <span id="age">-</span></p>
            <p><strong>📚 Course:</strong> <span id="course">-</span></p>
        </div>
    </div>
</div>

<script>
    const students = [
        { id: 1, name: "Rahul Sharma", age: 20, course: "BCA" },
        { id: 2, name: "Priya Singh", age: 22, course: "MCA" },
        { id: 3, name: "Amit Kumar", age: 19, course: "BSc IT" },
        { id: 4, name: "Ashish", age: 21, course: "BTech" },
        { id: 5, name: "Neha Gupta", age: 23, course: "MBA" }
    ];

    function searchStudent() {
        const id = parseInt(document.getElementById('studentId').value);
        const result = document.getElementById('result');
        const error = document.getElementById('errorMsg');

        result.classList.remove('show');
        error.classList.remove('show');

        const student = students.find(s => s.id === id);

        if (student) {
            document.getElementById('id').textContent = student.id;
            document.getElementById('name').textContent = student.name;
            document.getElementById('age').textContent = student.age + ' Years';
            document.getElementById('course').textContent = student.course;
            result.classList.add('show');
        } else {
            error.classList.add('show');
        }
    }

    document.getElementById('studentId').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchStudent();
    });
</script>

</body>
</html>
